# gVisor RuntimeClass for sandboxed pods
# Usage: kubectl apply -f k8s/runtimeclass-gvisor.yaml
# Then set AGENTBOX_RUNTIME_CLASS=gvisor in the launcher config.
#
# Prerequisites:
#   - kind node with runsc installed
#   - Or GKE with Sandbox enabled
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
handler: runsc
