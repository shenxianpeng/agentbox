# Job template for agent runner pods.
# The launcher creates Jobs from this template, injecting:
#   - RUN_ID as env var
#   - Scoped credentials via a temporary Secret (not as plain env vars)
#   - Database credentials via a temporary Secret (not as plain env vars)
#   - Logfire token via a temporary Secret
#   - Resource limits
#
# All Secrets are created by the launcher before the Job and deleted
# after the Job completes (or when the run is reaped).
#
# backoffLimit=0 because AgentBox handles retries via the Postgres checkpoint layer.
apiVersion: batch/v1
kind: Job
metadata:
  name: run-<RUN_ID>
  namespace: agentbox
  labels:
    agentbox.run_id: "<RUN_ID>"
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300  # clean up 5 min after completion
  template:
    metadata:
      labels:
        agentbox.run_id: "<RUN_ID>"
    spec:
      serviceAccountName: agentbox-launcher
<RUNTIME_CLASS>
      containers:
        - name: runner
          image: <RUNNER_IMAGE>
          env:
            - name: RUN_ID
              value: "<RUN_ID>"
            - name: MODEL_NAME
              value: "<MODEL_NAME>"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-creds-<RUN_ID>
                  key: database_url
            - name: LOGFIRE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: db-creds-<RUN_ID>
                  key: logfire_token
            - name: CREDENTIAL_PROXY_URL
              valueFrom:
                secretKeyRef:
                  name: db-creds-<RUN_ID>
                  key: credential_proxy_url
            - name: AGENTBOX_CREDENTIALS_JSON
              valueFrom:
                secretKeyRef:
                  name: creds-<RUN_ID>
                  key: credentials.json
            - name: HTTP_PROXY
              value: "<PROXY_URL>"
            - name: HTTPS_PROXY
              value: "<PROXY_URL>"
            - name: NO_PROXY
              value: "localhost,127.0.0.1,postgres,credential-proxy"
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      restartPolicy: Never
  # Note: Secrets db-creds-<RUN_ID> and creds-<RUN_ID> must be created
  # before the Job and deleted after the Job completes (handled by the launcher).
