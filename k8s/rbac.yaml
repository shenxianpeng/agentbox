# RBAC configuration for the AgentBox launcher.
# The launcher runs inside the cluster and needs permissions to
# create/list/delete Jobs and Secrets in the agentbox namespace.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentbox-launcher
  namespace: agentbox
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentbox-launcher
  namespace: agentbox
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentbox-launcher
  namespace: agentbox
subjects:
  - kind: ServiceAccount
    name: agentbox-launcher
    namespace: agentbox
roleRef:
  kind: Role
  name: agentbox-launcher
  apiGroup: rbac.authorization.k8s.io
