services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentbox
      POSTGRES_PASSWORD: agentbox
      POSTGRES_DB: agentbox
    ports:
      - "${AGENTBOX_POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentbox"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - agentbox-control

  control-plane:
    build:
      context: .
      dockerfile: docker/Dockerfile.controlplane
    ports:
      - "${AGENTBOX_API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://agentbox:agentbox@postgres:5432/agentbox
      AGENTBOX_API_TOKEN: ${AGENTBOX_API_TOKEN:-dev-token}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
      MODEL_NAME: ${MODEL_NAME:-deepseek-chat}
      RUNNER_IMAGE: ${RUNNER_IMAGE:-agentbox-runner:latest}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agentbox-control

  launcher:
    build:
      context: .
      dockerfile: docker/Dockerfile.controlplane
    entrypoint: ["uv", "run", "python", "-m", "agentbox.launcher.worker"]
    environment:
      DATABASE_URL: postgresql://agentbox:agentbox@postgres:5432/agentbox
      AGENTBOX_BACKEND: docker
      RUNNER_IMAGE: ${RUNNER_IMAGE:-agentbox-runner:latest}
      MAX_CONCURRENT_RUNS: ${MAX_CONCURRENT_RUNS:-3}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - agentbox-control
      - agentbox-internal

volumes:
  pgdata:

networks:
  agentbox-control:
    driver: bridge
  agentbox-internal:
    driver: bridge
    internal: true
