services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentbox
      POSTGRES_PASSWORD: agentbox
      POSTGRES_DB: agentbox
    ports:
      - "${AGENTBOX_POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentbox"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - agentbox-control
      - agentbox-internal

  control-plane:
    build:
      context: .
      dockerfile: docker/Dockerfile.controlplane
    ports:
      - "${AGENTBOX_API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://agentbox:agentbox@postgres:5432/agentbox
      AGENTBOX_API_TOKEN: ${AGENTBOX_API_TOKEN:-dev-token}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
      MODEL_NAME: ${MODEL_NAME:-deepseek-chat}
      RUNNER_IMAGE: ${RUNNER_IMAGE:-agentbox-runner:latest}
      CREDENTIAL_PROXY_URL: http://credential-proxy:9090
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agentbox-control

  egress-proxy:
    image: vimagick/tinyproxy:latest
    cap_add:
      - NET_ADMIN
    tmpfs: /run
    volumes:
      - ./docker/tinyproxy.conf:/etc/tinyproxy/tinyproxy.conf:ro
      - ./docker/tinyproxy-allowlist.txt:/etc/tinyproxy/tinyproxy-allowlist.txt:ro
    networks:
      - agentbox-control
      - agentbox-internal
    depends_on:
      - postgres

  credential-proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile.credential-proxy
    ports:
      - "${CREDENTIAL_PROXY_PORT:-9090}:9090"
    environment:
      AGENTBOX_API_TOKEN: ${AGENTBOX_API_TOKEN:-dev-token}
      CREDENTIAL_PROXY_PORT: "${CREDENTIAL_PROXY_PORT:-9090}"
    networks:
      - agentbox-control
      - agentbox-internal
    depends_on: [] 

  launcher:
    build:
      context: .
      dockerfile: docker/Dockerfile.controlplane
    entrypoint: ["uv", "run", "python", "-m", "agentbox.launcher.worker"]
    environment:
      DATABASE_URL: postgresql://agentbox:agentbox@postgres:5432/agentbox
      AGENTBOX_BACKEND: docker
      RUNNER_IMAGE: ${RUNNER_IMAGE:-agentbox-runner:latest}
      MAX_CONCURRENT_RUNS: ${MAX_CONCURRENT_RUNS:-3}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
      EGRESS_PROXY_HOST: egress-proxy
      EGRESS_PROXY_PORT: "8888"
      CREDENTIAL_PROXY_URL: http://credential-proxy:9090
    depends_on:
      - egress-proxy
      - credential-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - agentbox-control
      - agentbox-internal

volumes:
  pgdata:

networks:
  agentbox-control:
    # Explicit name: the launcher attaches runner containers by this exact
    # name (DockerBackend), so it must not get the compose project prefix.
    name: agentbox-control
    driver: bridge
  agentbox-internal:
    name: agentbox-internal
    driver: bridge
    internal: true
