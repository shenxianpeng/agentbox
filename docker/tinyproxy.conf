# Tinyproxy configuration for AgentBox egress control
# Only allowlisted destinations can be reached from sandbox containers.

Port 8888
Listen 0.0.0.0

# Allow only specific destinations
# LLM API endpoints
Allow 127.0.0.1
Allow ::1

# Per-run domains are added dynamically by the launcher
# (via a config template or sidecar — Phase 2)

# Default deny
Deny 0.0.0.0/0
Deny ::/0

# Security
BindSame yes
Syslog yes
LogLevel Info
PidFile "/var/run/tinyproxy.pid"
XTinyproxy yes
