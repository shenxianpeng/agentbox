# Tinyproxy configuration for AgentBox egress control
# Only allowlisted destinations can be reached from sandbox containers.
#
# Client IP restriction: we allow all clients because the
# agentbox-internal Docker network is `internal: true` (no direct internet),
# so the network boundary itself prevents external access.
#
# Destination filtering: uses Filter + FilterDefaultDeny Yes.
# Only domains in the filter file are allowed.
#
# Per-run egress_allow domains can be added dynamically (Phase 2).

Port 8888
Listen 0.0.0.0

# Allow all clients — access control is via Docker internal network
Allow 0.0.0.0/0
Allow ::/0

# Destination domain filtering
# FilterType ere (tinyproxy >= 1.11) so that [^.]+ subdomain patterns work;
# the default BRE mode treats '+' as a literal character.
# FilterURLs Off filters by host only: HTTPS CONNECT requests are matched as
# "host:port", so anchored host patterns would never match with FilterURLs On.
Filter "/etc/tinyproxy/tinyproxy-allowlist.txt"
FilterType ere
FilterURLs Off
FilterDefaultDeny Yes

# Security
BindSame yes
Syslog yes
LogLevel Info
PidFile "/var/run/tinyproxy.pid"
XTinyproxy yes
