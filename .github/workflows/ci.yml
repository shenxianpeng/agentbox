name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentbox
          POSTGRES_PASSWORD: agentbox
          POSTGRES_DB: agentbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Run migrations
        run: uv run python -m agentbox.db.migrate
        env:
          DATABASE_URL: postgresql://agentbox:agentbox@localhost:5432/agentbox

      - name: Test with pytest
        run: uv run pytest tests/ -v
        env:
          DATABASE_URL: postgresql://agentbox:agentbox@localhost:5432/agentbox
          AGENTBOX_API_TOKEN: test-token
