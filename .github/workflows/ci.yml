name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COLUMNS: 150
  DOCKER_BUILDKIT: 1

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-suffix: lint

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Check formatting with ruff
        run: uv run ruff format --check src/ tests/

      - name: Type check with pyright
        run: uv run pyright src/agentbox

      - name: Verify lockfile is up to date
        run: uv lock --check

  test:
    name: test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentbox
          POSTGRES_PASSWORD: agentbox
          POSTGRES_DB: agentbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: test-${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Run migrations
        run: uv run python -m agentbox.db.migrate
        env:
          DATABASE_URL: postgresql://agentbox:agentbox@localhost:5432/agentbox

      - name: Test with pytest
        run: uv run pytest tests/ -v --cov=agentbox --cov-report=xml --cov-report=term
        env:
          DATABASE_URL: postgresql://agentbox:agentbox@localhost:5432/agentbox
          AGENTBOX_API_TOKEN: test-token

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.runner
          tags: agentbox-runner:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify runner image
        run: docker run --rm agentbox-runner:ci uv run python -c "from agentbox.runner.durable import DurableContext; print('Runner image OK')"
